server.document-root = "/usr/share/webapp"
server.port          = 8080
server.errorlog      = "/dev/stderr"
server.pid-file      = "/tmp/lighttpd.pid"
server.modules       = ("mod_rewrite", "mod_setenv")

index-file.names = ("index.html")

# Deny clickjacking: every response is served with X-Frame-Options: DENY.
setenv.add-response-header = ("X-Frame-Options" => "DENY")

mimetype.assign = (
  ".html"  => "text/html; charset=utf-8",
  ".js"    => "application/javascript; charset=utf-8",
  ".mjs"   => "application/javascript; charset=utf-8",
  ".css"   => "text/css; charset=utf-8",
  ".json"  => "application/json; charset=utf-8",
  ".map"   => "application/json; charset=utf-8",
  ".svg"   => "image/svg+xml",
  ".png"   => "image/png",
  ".jpg"   => "image/jpeg",
  ".jpeg"  => "image/jpeg",
  ".gif"   => "image/gif",
  ".ico"   => "image/vnd.microsoft.icon",
  ".webp"  => "image/webp",
  ".woff"  => "font/woff",
  ".woff2" => "font/woff2",
  ".txt"   => "text/plain; charset=utf-8"
)

# SPA client-side routing: serve index.html for any path that is not an existing file.
url.rewrite-if-not-file = ( "" => "/index.html" )
