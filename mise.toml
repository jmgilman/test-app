# Single source of truth for ALL tool versions: language runtimes AND CLIs
# (incl. moon itself). moon declares no toolchains and runs the `system` binaries
# mise puts on PATH. CI installs these via jdx/mise-action.
[tools]
go = "1.26.4"
node = "24"

"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:moonrepo/moon"          = "2.3.5"

# Image build: melange (source -> signed Wolfi apk) + apko (apk -> minimal OCI image).
"aqua:chainguard-dev/melange" = "0.54.0"
"aqua:chainguard-dev/apko"    = "1.2.19"

# Release publish glue: jq (JSON) + yq (read each project's apko.yaml archs) drive the
# generic build/assemble matrix in the release workflow's plan job.
"aqua:jqlang/jq"  = "1.7.1"
"aqua:mikefarah/yq" = "4.52.4"

[env]
# Never auto-download a Go toolchain other than the one pinned above.
GOTOOLCHAIN = "local"

[settings]
lockfile = true
locked = true
