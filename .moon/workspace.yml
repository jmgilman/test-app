# Auto-discover root-level projects: any top-level directory that contains a
# moon.yml is a project (so non-project siblings like docs/ or hack/ are ignored).
# Dropping a new directory with a moon.yml is all it takes to onboard — no edits
# here, no edits to CI.
projects:
  globs:
    - '*/moon.yml'

vcs:
  defaultBranch: 'main'
  provider: 'github'

pipeline:
  installDependencies: false
