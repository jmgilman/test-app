# Inherited image tasks for any project that produces a container image
# (tagged `image`). Language-agnostic: the per-stack differences live entirely in
# each project's melange.yaml + apko.yaml. A new image-producing project is
# onboarded by adding those two files and the `image` tag — no edits here, and the
# release workflow picks it up automatically by discovery.
#
# Multi-arch publishing is split into two env-driven tasks so the release workflow
# can fan `image-build` out across native per-arch runners (melange must run on the
# build arch) and then run a single `image-assemble` (apko needs no build arch — it
# only lays apk files into a rootfs and writes the index). The split is what makes
# the build deterministic: one arch, one process, one runner filesystem.
inheritedBy:
  tags:
    or: ['image']

fileGroups:
  imageConfig:
    - 'melange.yaml'
    - 'apko.yaml'
    - '/mise.toml'
    - '/mise.lock'

tasks:
  # Build the image for the host arch and load it into the local Docker daemon as
  # <project>:dev. Single-arch. For local dev and as a CI dry-run.
  image:
    script: |
      set -euo pipefail
      case "$(uname -m)" in
        x86_64) arch=amd64 ;;
        aarch64|arm64) arch=arm64 ;;
        *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
      esac
      rm -rf packages image.tar melange.rsa melange.rsa.pub
      mkdir -p sbom
      melange keygen melange.rsa
      melange build melange.yaml --arch "$arch" --signing-key melange.rsa --runner docker --source-dir .
      apko build apko.yaml "${MOON_PROJECT_ID}:dev" image.tar --arch "$arch" --keyring-append ./melange.rsa.pub --sbom-path sbom
      docker load < image.tar
      docker tag "${MOON_PROJECT_ID}:dev-${arch}" "${MOON_PROJECT_ID}:dev"
      echo "loaded ${MOON_PROJECT_ID}:dev (arch ${arch})"
    options:
      cache: false
      runInCI: false

  # Build the signed apk packages for ONE arch (MELANGE_ARCH, e.g. amd64). Output
  # lands in packages/<goarch>/ (amd64->x86_64, arm64->aarch64). The signing key is
  # provided by the caller (the release workflow keygens once and distributes
  # melange.rsa to every build leg) so apko can verify every arch's index against a
  # single keyring. The release workflow runs this on a native runner per arch.
  image-build:
    script: |
      set -euo pipefail
      : "${MELANGE_ARCH:?MELANGE_ARCH must be set (e.g. amd64 or arm64)}"
      if [ ! -f melange.rsa ]; then
        echo "image-build: melange.rsa not found in $(pwd) — the release workflow provides the shared signing key" >&2
        exit 1
      fi
      rm -rf packages
      melange build melange.yaml --arch "$MELANGE_ARCH" --signing-key melange.rsa --runner docker --source-dir .
      echo "built ${MOON_PROJECT_ID} packages for arch ${MELANGE_ARCH}"
    # No inputs → the moon ci gate never marks it affected; the release workflow runs
    # it explicitly. runInCI stays default (true) so it is not filtered out of
    # `moon run` in a CI environment.
    inputs: []
    options:
      cache: false

  # Assemble + publish a multi-arch image (APKO_ARCHS, e.g. "amd64,arm64") to the
  # registry, tagged by the caller. Expects packages/<goarch>/ already populated for
  # every requested arch (the release workflow collects the per-arch build artifacts)
  # and melange.rsa.pub present. apko is the gate: its @local resolution hard-fails on
  # a missing arch BEFORE any push, so a partial build can never publish a half index.
  # The published reference (with digest) is written to apko-ref.txt for attestation.
  image-assemble:
    script: |
      set -euo pipefail
      : "${IMAGE_REGISTRY:?IMAGE_REGISTRY must be set (e.g. ghcr.io/owner)}"
      : "${IMAGE_TAG:?IMAGE_TAG must be set (the semver version)}"
      : "${APKO_ARCHS:?APKO_ARCHS must be set (e.g. amd64,arm64)}"
      if [ ! -f melange.rsa.pub ]; then
        echo "image-assemble: melange.rsa.pub not found in $(pwd) — the release workflow provides it" >&2
        exit 1
      fi
      ref="${IMAGE_REGISTRY}/${MOON_PROJECT_ID}:${IMAGE_TAG}"
      rm -rf sbom
      mkdir -p sbom
      apko publish apko.yaml "$ref" --arch "$APKO_ARCHS" --keyring-append ./melange.rsa.pub --sbom-path sbom > apko-ref.txt
      echo "published $(cat apko-ref.txt) (${APKO_ARCHS})"
    inputs: []
    options:
      cache: false
