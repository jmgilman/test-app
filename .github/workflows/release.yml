name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GOTOOLCHAIN: local
  # Images are published as ${IMAGE_REGISTRY}/<moon-project-id>:<git-sha>.
  IMAGE_REGISTRY: ghcr.io/jmgilman

# Generic publisher: builds and pushes an image for every project tagged `image`,
# discovered by moon. Adding a new image-producing project (an `image` tag + its
# melange.yaml/apko.yaml) is picked up automatically — this workflow never changes.
jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.6.14
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: moon run '#image:image-publish'
