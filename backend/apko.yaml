contents:
  repositories:
    - https://packages.wolfi.dev/os
    - "@local ./packages"
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - backend@local

entrypoint:
  command: /usr/bin/backend

# Run as a non-root user; create a writable data dir for the SQLite database.
accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

paths:
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

work-dir: /data

environment:
  PORT: "8080"
  DATABASE_PATH: /data/pastes.db

archs:
  - amd64
  - arm64

annotations:
  org.opencontainers.image.title: backend
  org.opencontainers.image.description: Pastebin backend API
  org.opencontainers.image.source: https://github.com/jmgilman/test-app
